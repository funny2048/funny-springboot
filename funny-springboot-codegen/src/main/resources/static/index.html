<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务端代码生成工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f9fb;
      --bg-card: #ffffff;
      --bg-input: #f3f4f6;
      --bg-hover: #eef0f3;
      --border: #e2e5ea;
      --border-focus: #6366f1;
      --accent: #6366f1;
      --accent-soft: #eef2ff;
      --accent-hover: #4f46e5;
      --accent-green: #10b981;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
      --shadow-lg: 0 12px 32px rgba(99,102,241,0.08), 0 4px 8px rgba(0,0,0,0.04);
      --radius: 12px;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Noto Sans SC', -apple-system, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -60px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .header {
      margin-bottom: 40px;
      animation: slideDown 0.5s ease-out;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 4px;
      padding-left: 48px;
    }

    .main-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      animation: slideUp 0.6s ease-out 0.1s both;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 24px 16px;
    }

    .card-icon {
      width: 28px;
      height: 28px;
      background: var(--accent-soft);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 24px;
    }

    .form-card {
      flex: 1.4;
      min-width: 380px;
      max-width: 520px;
      padding-bottom: 24px;
    }

    .form-body {
      padding: 20px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .field-label .req {
      color: #ef4444;
    }

    .field-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.92rem;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    .field-input::placeholder {
      color: var(--text-muted);
    }

    .field-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    textarea.field-input {
      resize: vertical;
      min-height: 52px;
      max-height: 90px;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--accent-soft);
      border: 1.5px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 500;
    }

    .version-badge .jdk {
      font-size: 0.72rem;
      color: rgba(99,102,241,0.6);
    }

    .type-toggle {
      display: flex;
      gap: 8px;
    }

    .type-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 8px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .type-btn input { display: none; }

    .type-btn:hover {
      border-color: var(--text-muted);
      background: var(--bg-hover);
    }

    .type-btn.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .type-icon {
      font-size: 1.15rem;
      opacity: 0.6;
    }

    .type-btn.selected .type-icon {
      opacity: 1;
    }

    .download-wrap {
      padding: 20px 24px 0;
    }

    .download-btn {
      width: 100%;
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.02em;
    }

    .download-btn:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .comp-panel {
      flex: 1;
      min-width: 300px;
      max-width: 520px;
      padding-bottom: 20px;
    }

    .comp-scroll {
      padding: 16px 24px 0;
      max-height: 480px;
      overflow-y: auto;
    }

    .comp-scroll::-webkit-scrollbar { width: 3px; }
    .comp-scroll::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    .comp-scroll::-webkit-scrollbar-track { background: transparent; }

    .comp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
      gap: 10px;
    }

    .comp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 8px 14px;
      background: var(--bg-input);
      border: 1.5px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .comp-item:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }

    .comp-item.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .comp-emoji {
      font-size: 1.4rem;
      margin-bottom: 6px;
      filter: grayscale(0.3);
      transition: filter 0.2s;
    }

    .comp-item:hover .comp-emoji,
    .comp-item.selected .comp-emoji {
      filter: grayscale(0);
    }

    .comp-name {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .comp-item.selected .comp-name {
      color: var(--accent);
    }

    .layered-view {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .layer {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .layer-title {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 4px;
      padding: 4px 8px;
      margin-top: 8px;
      white-space: nowrap;
    }

    .layer .comp-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .layer .comp-grid .comp-item {
      min-width: 90px;
      padding: 10px 12px;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .main-content { flex-direction: column; }
      .form-card, .comp-panel { max-width: 100%; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <div class="header-logo">F</div>
        <h1>服务端代码生成工具</h1>
      </div>
      <p class="header-desc">选择配置，一键生成 Spring Boot 项目脚手架</p>
    </div>

    <div class="main-content">
      <form class="card form-card" id="projectForm" onsubmit="return false;" autocomplete="off">
        <div class="card-header">
          <div class="card-icon">&#9881;</div>
          <div class="card-title">项目配置</div>
        </div>
        <div class="card-divider"></div>

        <div class="form-body">
          <div class="field-group">
            <div class="field-label">SpringBoot 版本</div>
            <div class="version-badge">
              <span>SpringBoot 3</span>
              <span class="jdk">JDK 21</span>
            </div>
            <input type="hidden" name="springbootVersion" value="springboot3" />
          </div>

          <div class="field-group">
            <label class="field-label">groupId <span class="req">*</span></label>
            <input class="field-input" type="text" id="groupId" name="groupId" required placeholder="如：com.example" value="com.funny" />
          </div>

          <div class="field-group">
            <label class="field-label">artifactId <span class="req">*</span></label>
            <input class="field-input" type="text" id="artifactId" name="artifactId" required placeholder="如：myapp" />
          </div>

          <div class="field-group">
            <label class="field-label">version</label>
            <input class="field-input" type="text" id="version" name="version" required placeholder="如：1.0.0" value="1.0.0" />
          </div>

          <div class="field-group">
            <label class="field-label">packageName <span class="req">*</span></label>
            <input class="field-input" type="text" id="packageName" name="packageName" required placeholder="如：com.example.myapp" value="com.funny" />
          </div>

          <div class="field-group">
            <label class="field-label">项目描述</label>
            <textarea class="field-input" id="description" name="description" placeholder="请输入项目描述"></textarea>
          </div>

          <div class="field-group">
            <div class="field-label">应用类型</div>
            <div class="type-toggle" id="appTypeGroup">
              <label class="type-btn selected">
                <input type="radio" name="appType" value="monolith" checked />
                <span class="type-icon">&#9632;</span>
                <span>单体应用</span>
              </label>
              <label class="type-btn">
                <input type="radio" name="appType" value="layered" />
                <span class="type-icon">&#9776;</span>
                <span>传统分层</span>
              </label>
              <label class="type-btn">
                <input type="radio" name="appType" value="ddd" />
                <span class="type-icon">&#9670;</span>
                <span>DDD应用</span>
              </label>
            </div>
          </div>
        </div>

        <div class="download-wrap">
          <button class="download-btn" id="downloadBtn">生成并下载</button>
        </div>
      </form>

      <div class="card comp-panel">
        <div class="card-header">
          <div class="card-icon">&#9878;</div>
          <div class="card-title">可选组件</div>
        </div>
        <div class="card-divider"></div>
        <div class="comp-scroll">
          <div id="componentPreview"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 组件数据
    var components = {
      monolith: [
        { key: 'xxl-job', label: 'xxl-job', emoji: '⏰' },
        { key: 'tool', label: '常用工具', emoji: '🔧' },
        { key: 'cache', label: '缓存+分布式锁', emoji: '🔒' },
        { key: 'es', label: 'ElasticSearch', emoji: '🔍' },
        { key: 'mq', label: '消息队列', emoji: '📩' },
        { key: 'encrypt', label: '加解密', emoji: '🔐' }
      ],
      layered: [
        { layer: 'web层', comps: [] },
        { layer: 'task层', comps: [
          { key: 'xxl-job', label: 'xxl-job', emoji: '⏰' }
        ]},
        { layer: 'service层', comps: [
          { key: 'tool', label: '常用工具', emoji: '🔧' },
          { key: 'cache', label: '缓存+分布式锁', emoji: '🔒' },
          { key: 'es', label: 'ElasticSearch', emoji: '🔍' },
          { key: 'mq', label: '消息队列', emoji: '📩' }
        ]},
        { layer: 'dao层', comps: [
          { key: 'encrypt', label: '加解密', emoji: '🔐' }
        ]}
      ],
      ddd: [
        { layer: '接口层', comps: [
          { key: 'web', label: 'Web接口', emoji: '🌐' }
        ]},
        { layer: '应用层', comps: [
          { key: 'service', label: '应用服务', emoji: '⚙' },
          { key: 'job', label: '定时任务', emoji: '⏰' }
        ]},
        { layer: '领域层', comps: [
          { key: 'domain', label: '领域模型', emoji: '💎' }
        ]},
        { layer: '基础设施', comps: [
          { key: 'dao', label: '数据访问', emoji: '🗃' },
          { key: 'cache', label: '缓存', emoji: '🔒' },
          { key: 'mq', label: '消息队列', emoji: '📩' },
          { key: 'security', label: '安全认证', emoji: '🔐' },
          { key: 'monitor', label: '监控', emoji: '📊' }
        ]}
      ]
    };

    var selectedComponents = new Set();
    var currentAppType = 'monolith';

    function createCompItem(comp) {
      var item = document.createElement('div');
      item.className = 'comp-item' + (selectedComponents.has(comp.key) ? ' selected' : '');
      var emojiSpan = document.createElement('span');
      emojiSpan.className = 'comp-emoji';
      emojiSpan.textContent = comp.emoji;
      var nameSpan = document.createElement('span');
      nameSpan.className = 'comp-name';
      nameSpan.textContent = comp.label;
      item.appendChild(emojiSpan);
      item.appendChild(nameSpan);
      item.onclick = function() { toggleComponent(comp.key); };
      return item;
    }

    function renderComponents(appType) {
      var preview = document.getElementById('componentPreview');
      preview.textContent = '';

      if (appType === 'monolith') {
        var grid = document.createElement('div');
        grid.className = 'comp-grid';
        components.monolith.forEach(function(comp) {
          grid.appendChild(createCompItem(comp));
        });
        preview.appendChild(grid);
      } else {
        var layered = document.createElement('div');
        layered.className = 'layered-view';
        var layerData = (appType === 'layered' ? components.layered : components.ddd);
        layerData.forEach(function(layer) {
          var layerDiv = document.createElement('div');
          layerDiv.className = 'layer';
          var title = document.createElement('div');
          title.className = 'layer-title';
          title.textContent = layer.layer;
          layerDiv.appendChild(title);
          var grid = document.createElement('div');
          grid.className = 'comp-grid';
          layer.comps.forEach(function(comp) {
            grid.appendChild(createCompItem(comp));
          });
          layerDiv.appendChild(grid);
          layered.appendChild(layerDiv);
        });
        preview.appendChild(layered);
      }
    }

    function toggleComponent(key) {
      if (selectedComponents.has(key)) {
        selectedComponents.delete(key);
      } else {
        selectedComponents.add(key);
      }
      renderComponents(currentAppType);
    }

    document.getElementById('appTypeGroup').addEventListener('click', function(e) {
      var btn = e.target.closest('.type-btn');
      if (btn) {
        this.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        var radio = btn.querySelector('input[type="radio"]');
        if (radio) {
          radio.checked = true;
          currentAppType = radio.value;
          selectedComponents = new Set();
          renderComponents(currentAppType);
        }
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      var form = document.getElementById('projectForm');
      var data = {
        springbootVersion: form.springbootVersion.value,
        groupId: form.groupId.value.trim(),
        artifactId: form.artifactId.value.trim(),
        version: form.version.value.trim(),
        packageName: form.packageName.value.trim(),
        description: form.description.value.trim(),
        appType: currentAppType,
        components: Array.from(selectedComponents)
      };
      if (!data.groupId || !data.artifactId || !data.packageName) {
        alert('请填写完整项目信息');
        return;
      }
      fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(function(res) {
        if (!res.ok) throw new Error('生成失败');
        return res.blob();
      })
      .then(function(blob) {
        var url = window.URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = (data.artifactId || 'project') + '.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      })
      .catch(function() { alert('生成或下载失败，请稍后重试'); });
    });

    renderComponents(currentAppType);
  </script>
</body>
</html>
